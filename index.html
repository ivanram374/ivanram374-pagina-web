<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #2c3e50, #95a5a6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 400px;
        }
        .container h2 {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #2980b9;
            color: #fff;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #6dd5fa;
        }
        .toggle {
            margin-top: 20px;
            cursor: pointer;
            color: #2980b9;
        }
        .forgot-password {
            margin-top: 10px;
            font-size: 0.9em;
            color: #2980b9;
            cursor: pointer;
        }
        .no-account-button {
            margin-top: 10px;
            background: #f39c12;
            width: 100%;
        }
        .no-account-button:hover {
            background: #f1c40f;
        }
        .ventas-button {
            margin-top: 10px;
            background: #27ae60;
            width: 100%;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .ventas-button:hover {
            background: #2ecc71;
        }
    </style>
</head>
<body>
<div class="container">
    <h2 id="formTitle">Iniciar Sesión</h2>
    
    <form id="userForm">
        <input type="email" id="email" placeholder="Correo electrónico" required />
        <input type="password" id="password" placeholder="Contraseña" required />
        <button type="submit">Ingresar</button>
    </form>

    <div class="forgot-password" onclick="forgotPassword()">¿Olvidaste tu contraseña?</div>
    <div class="toggle" onclick="toggleForm()">¿No tienes cuenta? Regístrate aquí</div>

    <button class="no-account-button" onclick="ingresarSinCuenta()">Ingresar sin cuenta</button>
    <button class="ventas-button" onclick="irAVentas()">Ir a Ventas</button>
</div>

<script>
    function ingresarSinCuenta() {
        window.location.href = 'bienvenida.html';
    }

    function forgotPassword() {
        window.location.href = 'cambiar_contraseña.html';
    }

    function toggleForm() {
        const formTitle = document.getElementById('formTitle');
        const userForm = document.getElementById('userForm');

        if (formTitle.textContent === 'Iniciar Sesión') {
            formTitle.textContent = 'Registrarse';
            userForm.innerHTML = `
                <input type="email" id="email" placeholder="Correo electrónico" required />
                <input type="password" id="password" placeholder="Contraseña" required />
                <input type="password" id="confirmPassword" placeholder="Confirmar Contraseña" required />
                <button type="submit">Registrarse</button>
            `;
        } else {
            formTitle.textContent = 'Iniciar Sesión';
            userForm.innerHTML = `
                <input type="email" id="email" placeholder="Correo electrónico" required />
                <input type="password" id="password" placeholder="Contraseña" required />
                <button type="submit">Ingresar</button>
            `;
        }
    }

    function irAVentas() {
        window.location.href = 'ventas.html';
    }
</script>
</body>
</html>
